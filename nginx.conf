server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressed responses
    gzip on;
    gzip_vary on;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Immutable cache for hashed Astro assets (_astro/ directory)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files (fonts, images, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Serve pre-rendered HTML files or fall back to index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
